<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiss Club — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">🇨🇭</div>
    <h1 class="login-title">Swiss Club</h1>
    <p class="login-sub">Member Management Portal</p>
    <button class="btn btn-primary btn-google" id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p class="login-note">Access is restricted to authorised club administrators.</p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      // If there's a ?code= in the URL, exchange it for a token first (async!)
      try {
        await Auth.handleCallback();
      } catch (err) {
        alert('Sign-in error: ' + err.message);
      }
      // Now check — token will be in sessionStorage if callback succeeded
      if (Auth.isAuthenticated()) {
        window.location.href = 'app.html';
        return;
      }
      // No active session — show the sign-in button
      document.getElementById('signin-btn').addEventListener('click', Auth.signIn);
    })();
  </script>
</body>
</html>
